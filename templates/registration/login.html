{% extends "base.html" %}
{% block title %}Login - Study Atlas{% endblock %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand-mark">S</div>
            <div class="brand-name">Study Atlas</div>
        </div>
        <div class="auth-heading">Welcome back</div>
        <div class="auth-sub">
            Log in to see your deadlines, priorities, and study plan.
        </div>
        <form method="post" class="django-form">
            {% csrf_token %} {{ form.as_p }}
            <button
                type="submit"
                class="btn btn-primary w-full"
                style="margin-top: var(--s4)"
            >
                Log in
            </button>
        </form>
        <div class="auth-footer">
            No account? <a href="{% url 'accounts:signup' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
