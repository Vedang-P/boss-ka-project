{% extends "base.html" %}
{% block title %}Sign up - Study Atlas{% endblock %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand-mark">S</div>
            <div class="brand-name">Study Atlas</div>
        </div>
        <div class="auth-heading">Create your account</div>
        <div class="auth-sub">
            Track deadlines, predict grades, and plan study sessions in one
            place.
        </div>
        <form method="post" class="django-form">
            {% csrf_token %} {{ form.as_p }}
            <button
                type="submit"
                class="btn btn-primary w-full"
                style="margin-top: var(--s4)"
            >
                Create account
            </button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
