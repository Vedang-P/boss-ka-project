{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth-card panel" style="width: 100%; max-width: 420px;">

    <div style="text-align: center; margin-bottom: var(--space-8);">
        <p class="eyebrow">Academic Aggregator</p>
        <h1 style="font-family: var(--font-display); font-size: var(--text-3xl); color: var(--text-primary); letter-spacing: 0.04em; margin-top: var(--space-2); line-height: 1;">
            Sign In
        </h1>
        <p style="color: var(--text-muted); font-size: var(--text-sm); margin-top: var(--space-2);">
            Access your command center.
        </p>
    </div>

    <form method="post" class="styled-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn--primary btn--full" style="margin-top: var(--space-4);">
            Sign In
        </button>
    </form>

    <p style="text-align: center; font-size: var(--text-sm); color: var(--text-muted); margin-top: var(--space-6);">
        No account? <a href="{% url 'accounts:signup' %}">Create one</a>
    </p>

</div>
{% endblock %}
