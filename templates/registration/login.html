{% extends "base.html" %}

{% block content %}
<section class="panel auth-panel">
    <h2>Login</h2>
    <p>Access your aggregated academic dashboard.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p class="muted">No account yet? <a href="{% url 'accounts:signup' %}">Create one here.</a></p>
</section>
{% endblock %}
