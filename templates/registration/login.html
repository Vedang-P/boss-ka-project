{% extends "base.html" %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<section class="auth-layout reveal">
    <article class="card auth-copy">
        <p class="label">Welcome back</p>
        <h2 class="page-title">Log in to continue.</h2>
        <p class="page-description">Access your academic dashboard with a minimal distraction free workspace.</p>
    </article>
    <article class="card form-card">
        <h3>Login</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button">Login</button>
        </form>
        <p class="muted">No account yet? <a class="action-link" href="{% url 'accounts:signup' %}">Create one</a></p>
    </article>
</section>
{% endblock %}
